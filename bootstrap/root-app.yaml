apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arda-root
  namespace: argocd
spec:
  project: arda-platform
  source:
    repoURL: https://github.com/arda-labs/arda-infra.git
    targetRevision: main
    path: argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
