apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-crm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-crm
  template:
    metadata:
      labels:
        app: go-crm
    spec:
      containers:
        - name: app
          image: ghcr.io/arda-labs/go-crm:latest
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: go-crm
spec:
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: go-crm
