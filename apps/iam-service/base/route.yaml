apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: iam-service-v2-route
spec:
  http:
  - name: iam-service-all
    priority: 10
    match:
      hosts:
      - api.arda.io.vn
      paths:
      - /v1/*
    plugins:
    - name: cors
      enable: true
      config:
        allow_origins: "https://arda.io.vn"
        allow_methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
        allow_headers: "content-type,authorization,x-tenant-id"
        expose_headers: "content-length,x-tenant-id"
        allow_credential: true
        max_age: 3600
    backends:
    - serviceName: iam-service
      servicePort: 80
