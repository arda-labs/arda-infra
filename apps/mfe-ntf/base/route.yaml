apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: mfe-ntf-route
spec:
  ingressClassName: apisix
  http:
    - name: mfe-ntf
      priority: 1000
      match:
        hosts:
          - arda.io.vn
        paths:
          - /mfe-ntf
          - /mfe-ntf/*
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - ^/mfe-ntf/?(.*)
              - /$1
        - name: cors
          enable: true
          config:
            allow_origins: "https://arda.io.vn"
            allow_methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
            allow_headers: "content-type,authorization,x-tenant-id"
            expose_headers: "content-length,x-tenant-id"
            allow_credential: true
            max_age: 3600
      backends:
        - serviceName: mfe-ntf
          servicePort: 80
