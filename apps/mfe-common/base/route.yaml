apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: mfe-common-route
spec:
  http:
  - name: mfe-common
    priority: 10
    match:
      hosts:
      - arda.io.vn
      paths:
      - /common/*
    plugins:
    - name: cors
      enable: true
      config:
        allow_origins: "**"
        allow_methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
        allow_headers: "Content-Type,Authorization,X-Tenant-ID"
        expose_headers: "Content-Length,X-Tenant-ID"
        max_age: 3600
    backends:
    - serviceName: mfe-common
      servicePort: 80
