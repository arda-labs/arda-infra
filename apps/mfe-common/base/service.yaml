apiVersion: apps/v1
kind: Deployment
metadata:
  name: mfe-common
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mfe-common
  template:
    metadata:
      labels:
        app: mfe-common
    spec:
      containers:
      - name: mfe-common
        image: ghcr.io/hoan02/mfe-common:latest
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: mfe-common
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: mfe-common
