gateway:
  type: ClusterIP

etcd:
  enabled: true
  persistence:
    enabled: false

ingress-controller:
  enabled: true
  config:
    apisix:
      adminAPIVersion: v3
    kubernetes:
      # Watch all namespaces
      namespaceSelector:
        - ""
      watchEndpointslices: false
  initSyncDelay: 0s
  # Đảm bảo Controller có quyền đọc CRD từ Kubernetes
  rbac:
    create: true

dashboard:
  enabled: false
