apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: arda-apps
resources:
- ../../base
images:
- name: ghcr.io/arda-labs/mfe-shell
  newName: ghcr.io/arda-labs/mfe-shell
  newTag: 8bc0dd2
configMapGenerator:
- behavior: merge
  literals:
  - API_URL=https://arda.io.vn/api
  - AUTH_AUTHORITY=https://arda.io.vn
  - MFE_IAM_URL=https://arda.io.vn/mfe-iam
  - MFE_MDM_URL=https://arda.io.vn/mfe-mdm
  name: mfe-shell-env-config
patches:
- path: route-dev-local.patch.yaml
  target:
    group: apisix.apache.org
    kind: ApisixRoute
    name: mfe-shell-route
    version: v2
