apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: arda-dev
resources:
- ../../base
images:
- name: ghcr.io/arda-labs/mfe-shell
  newName: ghcr.io/arda-labs/mfe-shell
  newTag: e445f0c
configMapGenerator:
- behavior: merge
  literals:
  - API_URL=https://api.dev.arda.io.vn
  name: mfe-shell-env-config
# AUTH_CLIENT_ID lưu trong Secret (không hardcode trong git)
# Tạo secret thủ công trên cluster:
#   kubectl create secret generic mfe-shell-secrets \
#     --from-literal=AUTH_CLIENT_ID=369717196990972004 \
#     -n arda-dev
