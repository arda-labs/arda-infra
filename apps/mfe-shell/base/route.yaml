apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: mfe-shell-route
spec:
  ingressClassName: apisix
  http:
  - name: mfe-shell
    priority: 1
    match:
      hosts:
      - arda.io.vn
      paths:
      - /*
      methods:
      - GET
      - HEAD
      - OPTIONS
    backends:
    - serviceName: mfe-shell
      servicePort: 80
