apiVersion: apps/v1
kind: Deployment
metadata:
  name: mfe-shell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mfe-shell
  template:
    metadata:
      labels:
        app: mfe-shell
    spec:
      containers:
        - name: mfe-shell
          image: ghcr.io/arda-labs/mfe-shell:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: env-template
              mountPath: /usr/share/nginx/html/assets/env.template.js
              subPath: env.template.js
          lifecycle:
            postStart:
              exec:
                command:
                  [
                    "/bin/sh",
                    "-c",
                    "envsubst < /usr/share/nginx/html/assets/env.template.js > /usr/share/nginx/html/assets/env.js",
                  ]
      volumes:
        - name: env-template
          configMap:
            name: mfe-shell-env-template
---
apiVersion: v1
kind: Service
metadata:
  name: mfe-shell
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: mfe-shell
