apiVersion: v1
kind: ConfigMap
metadata:
  name: mfe-shell-env-config
data:
  env.template.js: |
    (function(window) {
      window.__env = window.__env || {};
      window.__env.apiUrl = "${API_URL}";
      window.__env.authAuthority = "${AUTH_AUTHORITY}";
      window.__env.authClientId = "${AUTH_CLIENT_ID}";
      window.__env.mfeIamUrl = "${MFE_IAM_URL}";
      window.__env.mfeCommonUrl = "${MFE_COMMON_URL}";
    })(this);
