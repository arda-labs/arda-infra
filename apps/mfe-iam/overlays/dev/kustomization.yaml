apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: arda-dev
resources:
- ../../base
images:
- name: ghcr.io/arda-labs/mfe-iam
  newName: ghcr.io/arda-labs/mfe-iam
  newTag: f168d3c
configMapGenerator:
- behavior: merge
  literals:
  - API_URL=https://arda.io.vn/api
  name: mfe-iam-env-config
patches:
- path: route-dev-local.patch.yaml
  target:
    group: apisix.apache.org
    version: v2
    kind: ApisixRoute
    name: mfe-iam-route
