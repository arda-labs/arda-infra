apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: arda-apps
resources:
- ../../base
images:
- name: ghcr.io/arda-labs/mfe-iam
  newName: ghcr.io/arda-labs/mfe-iam
  newTag: f676afe
configMapGenerator:
- behavior: merge
  literals:
  - API_URL=https://arda.io.vn/api
  - AUTH_AUTHORITY=https://arda.io.vn
  name: mfe-iam-env-config
patches:
- path: route-dev-local.patch.yaml
  target:
    group: apisix.apache.org
    kind: ApisixRoute
    name: mfe-iam-route
    version: v2
