apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs-master
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs-master
  template:
    metadata:
      labels:
        app: seaweedfs-master
    spec:
      containers:
        - name: master
          image: chrislusf/seaweedfs:latest
          args: ["master", "-ip=0.0.0.0", "-port=9333"]
          ports:
            - containerPort: 9333
            - containerPort: 19333
