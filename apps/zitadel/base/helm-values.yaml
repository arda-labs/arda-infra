zitadel:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  configmapConfig:
    ExternalDomain: "auth.arda.io.vn"
    ExternalPort: 443
    ExternalSecure: true
    TLS:
      Enabled: false
    FirstInstance:
      Org:
        Name: "Arda"
        Human:
          UserName: "admin"
          Password: "${ZITADEL_ADMIN_PASSWORD}"
          FirstName: "Admin"
          LastName: "Arda"
          Email:
            Address: "admin@arda.io.vn"
            Verified: true
          PasswordChangeRequired: true
  secretConfig:
    Database:
      Postgres:
        DSN: "${ZITADEL_PG_DSN}"
  masterkeySecretName: "zitadel-masterkey"

postgresql:
  enabled: true
  auth:
    username: "${ZITADEL_PG_USER}"
    password: "${ZITADEL_PG_PASSWORD}"
    database: zitadel
  primary:
    persistence:
      enabled: false

ingress:
  enabled: false
